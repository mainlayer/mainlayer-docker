version: "3.9"

# FastAPI + Mainlayer sidecar example.
#
# Usage:
#   export MAINLAYER_API_KEY=ml_your_key
#   docker compose up --build

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      MAINLAYER_SIDECAR_URL: "http://mainlayer-verify:3000"
    depends_on:
      mainlayer-verify:
        condition: service_healthy
    networks:
      - app-net

  mainlayer-verify:
    image: mainlayer/mainlayer:latest
    command: ["serve", "--port", "3000"]
    environment:
      MAINLAYER_API_KEY: "${MAINLAYER_API_KEY:?Set MAINLAYER_API_KEY}"
      MAINLAYER_BASE_URL: "${MAINLAYER_BASE_URL:-https://api.mainlayer.xyz}"
    expose:
      - "3000"
    healthcheck:
      test: ["/usr/local/bin/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
