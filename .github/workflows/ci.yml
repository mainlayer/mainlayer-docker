name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: mainlayer/mainlayer:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Python image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.python
          push: false
          tags: mainlayer/mainlayer-python:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test image starts
        run: |
          docker run --rm mainlayer/mainlayer:ci --version || true
          echo "Image built and starts successfully"

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

      - name: Lint Dockerfile.python
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.python
          failure-threshold: error
